<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>INKOGNITO — Lobby</title>
    <link rel="stylesheet" href="pregame-lobby.css">
    <link rel="stylesheet" href="../shared/tooltip-system.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Black+Han+Sans&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ══ PRELOADER ══ -->
    <div class="preloader" id="preloader">
        <div class="preloader-ghost">
            <img src="/assets/characters/base_character.png" alt="Loading…" class="preloader-ghost-img">
        </div>
        <p class="preloader-text">Loading Lobby…</p>
    </div>

    <!-- ══ LOBBY ══ -->
    <div class="lobby-container" id="lobbyContainer" style="display:none;">

        <!-- star layers -->
        <div class="starfield-bg" aria-hidden="true"></div>
        <div id="twinkleLayer" aria-hidden="true"></div>

        <!-- ── TOP BAR ── -->
        <header class="top-bar">

            <div class="logo-area">
                <img src="/assets/logo/frame1.png" alt="INKOGNITO" class="logo">
                <!-- Lock icon — inline SVG fallback -->
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.75)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="height:clamp(14px,2.2vh,24px);width:auto;">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
            </div>

            <div class="top-right-actions">
                <!-- Room code — click to copy -->
                <div class="room-code-pill" id="roomCodePill" title="Click to copy room code">
                    <span class="room-code-label">ROOM</span>
                    <span class="room-code-val" id="roomCodeVal">AB12C</span>
                </div>

                <button id="leaveLobbyBtn" class="leave-btn">LEAVE LOBBY</button>

                <!-- Mic toggle — inline SVG -->
                <button class="icon-btn" id="voiceMuteBtn" aria-label="Toggle microphone">
                    <svg id="micSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="23" />
                        <line x1="8" y1="23" x2="16" y2="23" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- ── MAIN 3-COLUMN ── -->
        <main class="lobby-main">

            <!-- ── LEFT: Players ── -->
            <section class="panel left-panel" aria-label="Players">
                <div class="panel-label">
                    Players <span id="playerCount">1</span>&nbsp;/&nbsp;<span id="maxPlayersDisplay">6</span>
                    <span class="info-icon" data-tooltip="These are the players currently in the lobby">
                        <img src="/assets/UI Chalk/UI_Button_Chalk-10.png" alt="Info">
                    </span>
                </div>
                <div class="players-list-scroll" id="playersList">
                    <!-- Demo player — JS will replace this -->
                    <div class="player-card is-host">
                        <div class="player-avatar-wrapper">
                            <img src="/assets/characters/base_character.png" class="char-layer" alt="">
                            <img src="/assets/characters/hats/MarioHat.png" class="char-layer" alt="">
                            <img src="/assets/characters/expressions/glasses.png" class="char-layer" alt="">
                        </div>
                        <span class="player-name">Bhavesh (You)</span>
                        <span class="host-badge">HOST</span>
                    </div>
                    <div class="waiting-slot">Waiting…</div>
                    <div class="waiting-slot">Waiting…</div>
                    <div class="waiting-slot">Waiting…</div>
                    <div class="waiting-slot">Waiting…</div>
                </div>
            </section>

            <!-- ── CENTER: Settings + Mode + Actions ── -->
            <section class="panel center-panel" aria-label="Game settings">

                <!-- Settings two-column grid -->
                <div class="settings-grid">

                    <!-- ── Column 1 ── -->
                    <div class="settings-col">

                        <!-- Max Players -->
                        <div class="setting-row">
                            <!-- person icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="8" r="4" />
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                            </svg>
                            <label for="maxPlayers">Max Players</label>
                            <select id="maxPlayers" class="white-select" disabled>
                                <option value="2">2</option>
                                <option value="4">4</option>
                                <option value="6" selected>6</option>
                                <option value="8">8</option>
                                <option value="10">10</option>
                            </select>
                        </div>

                        <!-- Turn Duration -->
                        <div class="setting-row">
                            <!-- clock icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="9" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                            <label for="turnDuration">Turn Duration</label>
                            <select id="turnDuration" class="white-select" disabled>
                                <option value="5">5 Secs</option>
                                <option value="10">10 Secs</option>
                                <option value="15">15 Secs</option>
                                <option value="30">30 Secs</option>
                            </select>
                        </div>

                        <!-- Brush Size -->
                        <div class="setting-row">
                            <!-- brush icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <path
                                    d="M3 17c0 2.5 1.5 4 4 4 1.5 0 2.5-.5 3-1.5L20 5l-1-1L9.5 13.5C8.8 12.8 8 12 7 12c-2.2 0-4 1.8-4 5z" />
                            </svg>
                            <label for="brushSize">Brush Size</label>
                            <input type="range" id="brushSize" min="1" max="10" value="3" disabled>
                        </div>

                        <!-- Imposters -->
                        <div class="setting-row">
                            <!-- mask icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <path d="M12 2C6.5 2 2 6 2 10c0 5.5 4 10 10 10s10-4.5 10-10c0-4-4.5-8-10-8z" />
                                <path d="M9 11 Q12 14 15 11" stroke-width="1.5" />
                                <circle cx="9" cy="9" r="1.2" fill="currentColor" />
                                <circle cx="15" cy="9" r="1.2" fill="currentColor" />
                            </svg>
                            <label for="numberOfImposters">Imposters</label>
                            <select id="numberOfImposters" class="white-select" disabled>
                                <option value="1" selected>1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                        </div>

                        <!-- Slow-Mo Replay -->
                        <div class="setting-row">
                            <!-- rewind icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <polyline points="11 17 6 12 11 7" />
                                <polyline points="18 17 13 12 18 7" />
                            </svg>
                            <label for="slowMoReplay">Slow-Mo Replay</label>
                            <label class="switch">
                                <input type="checkbox" id="slowMoReplay" disabled>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <!-- Voice Chat -->
                        <div class="setting-row">
                            <!-- mic icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                                <line x1="12" y1="19" x2="12" y2="23" />
                            </svg>
                            <label for="allowVoiceChat">Voice Chat</label>
                            <label class="switch">
                                <input type="checkbox" id="allowVoiceChat" disabled>
                                <span class="slider"></span>
                            </label>
                        </div>

                    </div><!-- /col1 -->

                    <!-- ── Column 2 ── -->
                    <div class="settings-col">

                        <!-- Language -->
                        <div class="setting-row">
                            <!-- globe icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="2" y1="12" x2="22" y2="12" />
                                <path
                                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                            </svg>
                            <label for="language">Language</label>
                            <select id="language" class="white-select" disabled>
                                <option value="EN" selected>EN</option>
                                <option value="ES">ES</option>
                                <option value="FR">FR</option>
                                <option value="DE">DE</option>
                                <option value="PT">PT</option>
                                <option value="TR">TR</option>
                            </select>
                        </div>

                        <!-- Ink Limit -->
                        <div class="setting-row">
                            <!-- droplet icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <path d="M12 2 C12 2 5 10 5 15 a7 7 0 0 0 14 0 C19 10 12 2 12 2z" />
                            </svg>
                            <label for="inkLimit">Ink Limit</label>
                            <input type="range" id="inkLimit" min="10" max="100" value="50" disabled>
                        </div>

                        <!-- Vote Time -->
                        <div class="setting-row">
                            <!-- vote/check icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <polyline points="9 11 12 14 22 4" />
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                            </svg>
                            <label for="voteTime">Vote Time <span class="muted-text">secs</span></label>
                            <select id="voteTime" class="white-select" disabled>
                                <option value="15">15 Secs</option>
                                <option value="30" selected>30 Secs</option>
                                <option value="60">60 Secs</option>
                            </select>
                        </div>

                        <!-- Anon Vote -->
                        <div class="setting-row">
                            <!-- eye-off icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                            <label for="anonymousVote">Anon Vote</label>
                            <label class="switch">
                                <input type="checkbox" id="anonymousVote" disabled>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <!-- Show Timer -->
                        <div class="setting-row">
                            <!-- timer icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="13" r="8" />
                                <polyline points="12 9 12 13 15 13" />
                                <line x1="9" y1="3" x2="15" y2="3" />
                            </svg>
                            <label for="showTimer">Show Timer</label>
                            <label class="switch">
                                <input type="checkbox" id="showTimer" checked disabled>
                                <span class="slider"></span>
                            </label>
                        </div>

                        <!-- Spectators -->
                        <div class="setting-row">
                            <!-- eye icon -->
                            <svg class="setting-icon-svg" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <label for="spectatorMode">Spectators</label>
                            <label class="switch">
                                <input type="checkbox" id="spectatorMode" disabled>
                                <span class="slider"></span>
                            </label>
                        </div>

                    </div><!-- /col2 -->

                </div><!-- /settings-grid -->

                <!-- ── Custom Words ── -->
                <hr class="section-divider">
                <div class="custom-words-box">
                    <div class="custom-words-header">
                        <label>Press Enter to add a word</label>
                        <div class="custom-toggle-label">
                            Custom Words
                            <label class="switch">
                                <input type="checkbox" id="customWordsEnabled" disabled>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <input type="text" id="customWordInput" placeholder="Add a custom word…" autocomplete="off"
                        disabled>
                    <div id="customWordsList" class="custom-words-list"></div>
                </div>

                <!-- ── Select Mode ── -->
                <hr class="section-divider">
                <div class="modes-section">
                    <div class="modes-header">
                        <h2 class="modes-title">SELECT <span>MODE</span></h2>
                    </div>
                    <div class="modes-grid">
                        <div class="mode-card active" data-mode="Final Verdict" id="modeFinalVerdict" role="button"
                            tabindex="0" aria-pressed="true">
                            <span class="mode-name">Final Verdict</span>
                            <img src="/assets/UI Chalk/fianlverdict_art.png" alt="Gavel"
                                onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <!-- SVG fallback gavel -->
                            <svg style="display:none;height:clamp(42px,6vh,80px);color:inherit" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M14 13l6 6-2 2-6-6" />
                                <path d="M3 3l5 5-2 2-5-5 2-2z" />
                                <path d="M9 9l6 6" />
                            </svg>
                        </div>
                        <div class="mode-card" data-mode="Investigation" id="modeInvestigation" role="button"
                            tabindex="0" aria-pressed="false">
                            <span class="mode-name">Investigation</span>
                            <img src="/assets/UI Chalk/Investigation_art.png" alt="Magnifying glass"
                                onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <!-- SVG fallback magnify -->
                            <svg style="display:none;height:clamp(42px,6vh,80px);color:inherit" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="7" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- ── Actions ── -->
                <div class="actions-row">
                    <button class="chalk-btn start-btn" id="startGameBtn" disabled>START GAME</button>
                    <button class="chalk-btn invite-btn" id="inviteBtn">INVITE</button>
                    <input type="text" id="copyUrlInput" style="position:absolute;left:-9999px;" readonly
                        aria-hidden="true">
                </div>

            </section><!-- /center-panel -->

            <!-- ── RIGHT: Chat ── -->
            <section class="panel right-panel" aria-label="Chat">
                <div class="chat-header">
                    <span class="chat-header-dot"></span>
                    CHAT
                </div>

                <div class="chat-messages" id="chatMessages" role="log" aria-live="polite">
                    <div class="chat-msg system">
                        <span class="msg-sender">SYSTEM</span>Lobby created. Invite your friends!
                    </div>
                </div>

                <div class="chat-input-area">
                    <form id="chatForm" autocomplete="off">
                        <input type="text" id="chatInput" placeholder="type to chat…" maxlength="120"
                            aria-label="Chat message">
                        <!-- Send button inline SVG arrow -->
                        <button type="submit" class="send-btn" aria-label="Send">
                            <svg viewBox="0 0 24 24">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </form>
                </div>
            </section>

        </main>

        <div id="lobbyToast" class="toast" role="alert" aria-live="polite"></div>

    </div><!-- /lobby-container -->

    <!-- ══════════════ SCRIPTS ══════════════ -->

    <!-- Twinkling stars -->
    <script>
        (function () {
            const layer = document.getElementById('twinkleLayer');
            for (let i = 0; i < 22; i++) {
                const s = document.createElement('div');
                s.className = 'star-twinkle';
                const sz = (Math.random() * 1.8 + 0.8).toFixed(1) + 'px';
                s.style.cssText = [
                    '--x:' + (Math.random() * 100).toFixed(1) + '%',
                    '--y:' + (Math.random() * 100).toFixed(1) + '%',
                    '--sz:' + sz,
                    '--dur:' + (Math.random() * 3 + 2).toFixed(1) + 's',
                    '--delay:' + (Math.random() * 5).toFixed(1) + 's',
                    '--op:' + (Math.random() * .55 + 0.45).toFixed(2)
                ].join(';');
                layer.appendChild(s);
            }
        })();
    </script>

    <!-- Room code copy -->
    <script>
        document.getElementById('roomCodePill').addEventListener('click', function () {
            const code = document.getElementById('roomCodeVal').textContent;
            navigator.clipboard.writeText(code).catch(() => { });
            showToast('Room code copied: ' + code);
        });
    </script>

    <!-- Mode selection -->
    <script>
        document.querySelectorAll('.mode-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.mode-card').forEach(c => {
                    c.classList.remove('active'); c.setAttribute('aria-pressed', 'false');
                });
                card.classList.add('active'); card.setAttribute('aria-pressed', 'true');
            });
            card.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
            });
        });
    </script>

    <!-- Custom words -->
    <script>
        const cwEnabled = document.getElementById('customWordsEnabled');
        const cwInput = document.getElementById('customWordInput');
        const cwList = document.getElementById('customWordsList');
        cwEnabled.addEventListener('change', () => {
            cwInput.disabled = !cwEnabled.checked;
            if (cwEnabled.checked) cwInput.focus();
        });
        cwInput.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            const val = cwInput.value.trim(); if (!val) return;
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerHTML = val + '<span class="remove-word" title="Remove">×</span>';
            chip.querySelector('.remove-word').addEventListener('click', () => chip.remove());
            cwList.appendChild(chip);
            cwInput.value = '';
        });
    </script>

    <!-- Invite button -->
    <script>
        document.getElementById('inviteBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).catch(() => { });
            showToast('Invite link copied!');
        });
    </script>

    <!-- Chat -->
    <script>
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        chatForm.addEventListener('submit', e => {
            e.preventDefault();
            const text = chatInput.value.trim(); if (!text) return;
            appendMsg('You', text, false);
            chatInput.value = '';
        });
        function appendMsg(sender, text, isSystem) {
            const div = document.createElement('div');
            div.className = 'chat-msg' + (isSystem ? ' system' : '');
            div.innerHTML = '<span class="msg-sender">' + sender + '</span>' + text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>

    <!-- Mic mute toggle -->
    <script>
        const muteBtn = document.getElementById('voiceMuteBtn');
        const micSvg = document.getElementById('micSvg');
        let muted = false;
        muteBtn.addEventListener('click', () => {
            muted = !muted;
            muteBtn.classList.toggle('muted', muted);
            muteBtn.setAttribute('aria-label', muted ? 'Unmute microphone' : 'Mute microphone');
            // draw a slash over the mic when muted
            const slash = micSvg.querySelector('.mute-slash');
            if (muted) {
                if (!slash) {
                    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    l.setAttribute('x1', '1'); l.setAttribute('y1', '1');
                    l.setAttribute('x2', '23'); l.setAttribute('y2', '23');
                    l.setAttribute('class', 'mute-slash');
                    micSvg.appendChild(l);
                }
            } else {
                if (slash) slash.remove();
            }
        });
    </script>

    <!-- Leave -->
    <script>
        document.getElementById('leaveLobbyBtn').addEventListener('click', () => {
            if (confirm('Leave the lobby?')) window.location.href = '/';
        });
    </script>

    <!-- Toast helper -->
    <script>
        function showToast(msg, dur) {
            const t = document.getElementById('lobbyToast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._tid);
            t._tid = setTimeout(() => t.classList.remove('show'), dur || 2200);
        }
    </script>

    <!-- Preloader hide -->
    <script>
        window.addEventListener('load', () => {
            const pre = document.getElementById('preloader');
            const container = document.getElementById('lobbyContainer');
            setTimeout(() => {
                pre.classList.add('hidden');
                container.style.display = 'flex';
                setTimeout(() => pre.remove(), 500);
            }, 600);
        });
    </script>

    <!-- Sockets Client -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="../shared/socket-client.js"></script>
    <script src="../shared/tooltip-system.js"></script>
    <script src="../shared/config.js"></script>
    <script src="pregame-lobby.js"></script>
</body>

</html>
